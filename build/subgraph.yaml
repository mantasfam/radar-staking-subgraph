specVersion: 0.0.4
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: StakingRewardsProxy
    network: mainnet
    source:
      address: "0x962B4D8b1f8940D6a67399DC3A8D7549250888B8"
      abi: StakingRewardsProxy
      startBlock: 15177327
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.5
      language: wasm/assemblyscript
      entities:
        - StakeInitiated
        - Withdrawn
      abis:
        - name: StakingRewardsProxy
          file: StakingRewardsProxy/abis/StakingRewardsProxy.json
      eventHandlers:
        - event: StakeInitiated(indexed address,uint256)
          handler: handleStakeInitiated
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: StakingRewardsProxy/StakingRewardsProxy.wasm
